<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Union Cocktail Bar & Restaurant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300..700;1,300..700&family=Syne:wght@400..800&family=Cinzel:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0c0a;
            --text: #e2e0d5;
            --text-dim: #8b8b86;
            --accent: #ceFF00;
            --surface: #151614;
            --border: rgba(226, 224, 213, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            position: relative;
        }

        /* SVG Noise Texture */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.04;
            background: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
        }

        /* Editorial Hero */
        .hero {
            min-height: 45vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 2rem 1.5rem;
            position: relative;
            border-bottom: 1px solid var(--border);
            overflow: hidden;
        }
        
        /* Subtle gradient bloblet behind hero */
        .hero::after {
            content: '';
            position: absolute;
            top: -50%; left: -20%;
            width: 150%; height: 150%;
            background: radial-gradient(circle at center, rgba(206, 255, 0, 0.05) 0%, transparent 60%);
            z-index: 0;
            pointer-events: none;
        }

        .brand-name {
            font-family: 'Cinzel', serif;
            font-size: clamp(3rem, 12vw, 8rem);
            font-weight: 900;
            line-height: 0.9;
            text-transform: uppercase;
            color: var(--text);
            z-index: 1;
            letter-spacing: -2px;
            margin-left: -4px;
        }
        
        .brand-sub {
            font-family: 'Syne', sans-serif;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--accent);
            margin-top: 1rem;
            z-index: 1;
            font-weight: 700;
        }

        /* Slider - Hidden/Removed structurally but kept for ID compatibility */
        #slider-track { display: none; }
        .slide { display: none; }

        /* Navigation */
        .nav-container {
            position: sticky;
            top: 0;
            background: rgba(11, 12, 10, 0.85);
            backdrop-filter: blur(12px);
            z-index: 100;
            border-bottom: 1px solid var(--border);
            padding: 1rem 0;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            padding: 0 1.5rem;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .nav-links::-webkit-scrollbar { display: none; }

        .nav-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            font-family: 'Syne', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-btn.active {
            color: var(--accent);
        }

        .nav-btn::after {
            content: '';
            position: absolute;
            bottom: -8px; left: 0;
            width: 0%; height: 2px;
            background: var(--accent);
            transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .nav-btn.active::after { width: 100%; }

        /* Categories & Items */
        .menu-container {
            padding: 4rem 1.5rem 8rem;
            max-width: 1000px;
            margin: 0 auto;
        }

        #category-title {
            font-family: 'Cormorant', serif;
            font-size: 4rem;
            font-weight: 300;
            font-style: italic;
            color: var(--text);
            margin-bottom: 3rem;
            text-transform: lowercase;
            line-height: 1;
        }

        .menu-items-grid {
            display: flex;
            flex-direction: column;
            gap: 4rem;
        }

        .menu-item {
            display: grid;
            grid-template-columns: 100px 1fr;
            gap: 1.5rem;
            align-items: start;
            opacity: 0;
            transform: translateY(20px);
            position: relative;
            transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .menu-item.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        .menu-item::after {
            content: '';
            position: absolute;
            bottom: -2rem; left: 0; width: 100%; height: 1px;
            background: linear-gradient(90deg, var(--border), transparent);
        }

        .item-image {
            width: 100%;
            aspect-ratio: 3/4;
            object-fit: cover;
            filter: grayscale(80%) contrast(1.2);
            transition: filter 0.5s ease;
        }
        
        .menu-item:hover .item-image { filter: grayscale(0%) contrast(1.1); }

        .item-details { display: flex; flex-direction: column; gap: 0.5rem; }

        .item-header {
            display: flex; flex-direction: column; gap: 0.2rem;
        }

        .item-name {
            font-family: 'Cormorant', serif;
            font-size: 1.8rem;
            font-weight: 600;
            line-height: 1.1;
            margin: 0;
        }

        .item-price {
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--accent);
            display: inline-flex;
            align-items: baseline;
            gap: 4px;
        }

        .price-currency {
            font-size: 0.7rem; font-weight: 500; opacity: 0.8;
            letter-spacing: 1px;
        }

        .item-description {
            font-size: 0.9rem;
            line-height: 1.5;
            color: var(--text-dim);
            margin-top: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .order-btn {
            align-self: flex-start;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.6rem 1.5rem;
            font-family: 'Syne', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .order-btn:hover {
            border-color: var(--accent);
            color: var(--bg);
            background: var(--accent);
        }
        
        @keyframes pulseAccent {
            0% { box-shadow: 0 0 0 0 rgba(206, 255, 0, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(206, 255, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(206, 255, 0, 0); }
        }
        .order-btn.pulse { animation: pulseAccent 2s infinite; border-color: var(--accent); }

        /* Order Modal Modern Brutalism */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 9998;
            opacity: 0; visibility: hidden;
            transition: all 0.4s ease;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }

        .order-modal {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--surface);
            border-top: 1px solid var(--border);
            z-index: 9999;
            transform: translateY(100%);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            max-height: 90vh; overflow-y: auto;
            border-radius: 20px 20px 0 0;
            display: flex; flex-direction: column;
        }
        .order-modal.active { transform: translateY(0); }

        .modal-body { padding: 2rem 1.5rem 0rem; }
        
        .modal-handle { display: none; }
        .modal-close {
            position: absolute; top: 1.5rem; right: 1.5rem;
            background: none; border: none;
            color: var(--text); font-size: 2rem; cursor: pointer;
            line-height: 1;
            z-index: 10;
        }

        .modal-food-card {
            display: flex; gap: 1.5rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 2rem;
        }
        .modal-food-img {
            width: 100px; height: 100px; object-fit: cover;
            filter: grayscale(50%);
        }
        .modal-food-info { flex: 1; }
        .modal-food-name {
            font-family: 'Cormorant', serif; font-size: 1.8rem;
            margin-bottom: 0.5rem; line-height: 1;
        }
        .modal-food-desc { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 1rem; }
        .modal-food-price {
            font-family: 'Syne', sans-serif; color: var(--accent);
            font-weight: 700; font-size: 1.1rem;
        }

        /* Accordions */
        .addon-section { border: 1px solid var(--border); margin-bottom: 1rem; }
        .addon-header {
            padding: 1rem 1.5rem; background: transparent;
            font-weight: 600; font-size: 0.85rem; text-transform: uppercase;
            letter-spacing: 1px; display: flex; justify-content: space-between;
            align-items: center; cursor: pointer;
        }
        .addon-header:hover { background: rgba(255,255,255,0.02); }
        .addon-header .addon-arrow { transition: transform 0.3s ease; }
        .addon-header.open .addon-arrow { transform: rotate(180deg); }
        .addon-header .addon-badge {
            background: var(--text); color: var(--bg);
            padding: 2px 8px; font-size: 0.7rem; font-weight: 700;
        }

        .addon-items {
            max-height: 0; overflow: hidden;
            transition: all 0.4s ease; padding: 0 1.5rem;
            display: flex; flex-wrap: wrap; gap: 0.8rem;
        }
        .addon-items.open { max-height: 800px; padding: 1rem 1.5rem 1.5rem; border-top: 1px solid var(--border); }

        .addon-chip {
            padding: 0.5rem 1rem; border: 1px solid var(--border);
            font-size: 0.8rem; cursor: pointer; transition: all 0.2s;
            color: var(--text-dim);
        }
        .addon-chip.selected {
            background: var(--accent); color: var(--bg); border-color: var(--accent);
            font-weight: 700;
        }
        .addon-chip .chip-price { font-size: 0.7rem; opacity: 0.7; margin-left: 4px; }

        .modal-confirm {
            background: none; border: none; font-family: 'Syne', sans-serif;
            color: var(--text-dim); font-size: 0.8rem; text-decoration: underline;
            padding: 1rem 0; cursor: pointer; display: block; margin: 1rem auto 0;
            text-underline-offset: 4px;
        }

        /* Sticky Footer */
        .modal-footer {
            background: rgba(21, 22, 20, 0.95);
            backdrop-filter: blur(10px);
            padding: 1.5rem 1.5rem 2rem;
            border-top: 1px solid var(--border);
            display: flex; flex-direction: column; gap: 1rem;
        }

        .footer-top {
            display: flex; justify-content: space-between; align-items: flex-end;
        }

        .total-section { display: flex; flex-direction: column; }
        .total-label { font-size: 0.7rem; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; }
        .total-amount { font-family: 'Cormorant', serif; font-size: 2.2rem; color: var(--text); line-height: 1; }

        .table-input-container { display: flex; align-items: center; gap: 1rem; }
        .table-input-label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); }
        .table-input {
            width: 70px; background: transparent; border: 1px solid var(--text-dim);
            color: var(--text); padding: 0.5rem; text-align: center;
            font-family: 'Syne', sans-serif; font-size: 1.2rem;
        }
        .table-input:focus { border-color: var(--accent); outline: none; }

        .place-order-btn {
            width: 100%; background: var(--text); color: var(--bg);
            border: none; padding: 1.2rem; font-family: 'Syne', sans-serif;
            font-weight: 700; font-size: 1rem; text-transform: uppercase;
            letter-spacing: 2px; cursor: pointer; transition: all 0.3s;
        }
        .place-order-btn:hover { background: var(--accent); }

        /* Toast */
        .order-toast {
            position: fixed; top: 20px; left: 50%; transform: translate(-50%, -100px);
            background: var(--accent); color: var(--bg);
            padding: 1rem 2rem; font-weight: 700; font-size: 0.9rem;
            z-index: 10000; opacity: 0; transition: all 0.4s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .order-toast.show { transform: translate(-50%, 0); opacity: 1; }

        /* Tracker */
        .order-tracker {
            position: fixed; top: 20px; left: 50%; width: 90%; max-width: 400px;
            transform: translate(-50%, -150%); background: var(--surface);
            border: 1px solid var(--accent); padding: 1.5rem;
            z-index: 9997; transition: all 0.5s ease;
        }
        .order-tracker.visible { transform: translate(-50%, 0); }
        .tracker-info { display: flex; justify-content: space-between; font-weight: 700; margin-bottom: 0.5rem; }
        .tracker-label { color: var(--text-dim); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; }
        #tracker-status { color: var(--accent); font-family: 'Cormorant', serif; font-size: 1.5rem; font-style: italic; }
        #tracker-close {
            background: none; border: none; color: var(--text-dim); text-decoration: underline;
            font-size: 0.7rem; cursor: pointer; margin-top: 1rem; text-transform: uppercase; letter-spacing: 1px;
        }
        .hidden { display: none !important; }

        @media (min-width: 768px) {
            .menu-items-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 5rem 3rem;
            }
            .hero { min-height: 55vh; padding: 4rem; }
            .brand-name { font-size: 10rem; }
        }
    </style>
</head>

        document.addEventListener('DOMContentLoaded', () => {
            const navButtons = document.querySelectorAll('.nav-btn');
            const menuItemsContainer = document.getElementById('menu-items');
            const categoryTitle = document.getElementById('category-title');

            function renderMenu(category) {
                categoryTitle.textContent = category.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
                menuItemsContainer.innerHTML = '';
                const items = menuData[category];

                items.forEach((item, index) => {
                    const itemElement = document.createElement('div');
                    itemElement.className = 'menu-item';
                    const priceParts = item.price.split(' ');
                    const amount = priceParts[0];
                    const currency = priceParts.slice(1).join(' ');

                    itemElement.innerHTML = `
                        <img loading="lazy" src="${item.image}" alt="${item.name}" class="item-image">
                        <div class="item-details">
                            <div class="item-header">
                                <h3 class="item-name">${item.name}</h3>
                            </div>
                            <p class="item-description">${item.description}</p>
                            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-top: auto;">
                                <div class="item-price">${amount}<span class="price-currency">${currency}</span></div>
                                <button class="order-btn" onclick="orderItem('${item.name.replace(/'/g, "\\'")}')" aria-label="Order ${item.name}">ADD</button>
                            </div>
                        </div>
                    `;
                    menuItemsContainer.appendChild(itemElement);

                    setTimeout(() => {
                        itemElement.classList.add('visible');
                        const btn = itemElement.querySelector('.order-btn');
                        if (btn) btn.classList.add('pulse');
                    }, 50 * index);
                });
            }

            const urlParams = new URLSearchParams(window.location.search);
            const userPasscode = urlParams.get('passcode');

            if (window.firebaseGet && window.firebaseRef && window.firebaseDb) {
                window.firebaseGet(window.firebaseRef(window.firebaseDb, 'settings/activeToken')).then((snapshot) => {
                    const activeToken = snapshot.val();

                    // Allow access if they match or if the admin hasn't generated a token yet
                    if (!activeToken || userPasscode === activeToken) {
                        renderMenu('starters');
                    } else {
                        document.body.innerHTML = `
                            <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; background: #2b5329; color: white; padding: 2rem; font-family: 'Plus Jakarta Sans', sans-serif;">
                                <h1 style="font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 1rem;">Menu Locked 🔒</h1>
                                <p style="font-size: 1.1rem; opacity: 0.9; margin-bottom: 1.5rem;">To view our menu and place an order, please scan the QR code located safely at your table!</p>
                            </div>
                        `;
                    }
                }).catch(err => {
                    renderMenu('starters');
                });
            } else {
                renderMenu('starters');
            }

            const allCategoryButtons = document.querySelectorAll('[data-category]');

            allCategoryButtons.forEach(button => {
                button.addEventListener('click', () => {
                    allCategoryButtons.forEach(btn => btn.classList.remove('active'));

                    button.classList.add('active');
                    const category = button.getAttribute('data-category');

                    renderMenu(category);

                    if (window.innerWidth < 768) {
                        categoryTitle.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                });
            });

            // Slider Logic
            const sliderTrack = document.getElementById('slider-track');
            const sliderSlides = document.querySelectorAll('.slide');
            let currentSlideIndex = 0;
            const totalSlides = sliderSlides.length;

            if (totalSlides > 0) {
                setInterval(() => {
                    currentSlideIndex = (currentSlideIndex + 1) % totalSlides;
                    sliderTrack.style.transform = `translateX(-${currentSlideIndex * 100}%)`;
                }, 4500);
            }

            // ── Order Modal Logic ──
            const modal = document.getElementById('order-modal');
            const overlay = document.getElementById('modal-overlay');
            const modalClose = document.getElementById('modal-close');
            const modalConfirm = document.getElementById('modal-confirm');

            let selectedAddons = { beverages: new Set(), cocktails: new Set() };

            let currentFoodPrice = 0;

            function parsePrice(priceStr) {
                return parseInt(priceStr.replace(/[^0-9]/g, '')) || 0;
            }

            function updateTotal() {
                let total = currentFoodPrice;
                selectedAddons.beverages.forEach(name => {
                    const item = menuData.beverages.find(i => i.name === name);
                    if (item) total += parsePrice(item.price);
                });
                selectedAddons.cocktails.forEach(name => {
                    const item = menuData.cocktails.find(i => i.name === name);
                    if (item) total += parsePrice(item.price);
                });
                document.getElementById('modal-total').textContent = total.toLocaleString() + ' Birr';
            }

            // Build addon chips for a category
            function buildChips(containerId, dataKey, countId) {
                const container = document.getElementById(containerId);
                container.innerHTML = '';
                menuData[dataKey].forEach(item => {
                    const chip = document.createElement('span');
                    chip.className = 'addon-chip';
                    chip.dataset.name = item.name;
                    chip.innerHTML = `${item.name} <span class="chip-price">${item.price}</span>`;
                    chip.addEventListener('click', () => {
                        chip.classList.toggle('selected');
                        const set = selectedAddons[dataKey];
                        if (chip.classList.contains('selected')) { set.add(item.name); }
                        else { set.delete(item.name); }
                        document.getElementById(countId).textContent = set.size + ' selected';
                        updateTotal();
                    });
                    container.appendChild(chip);
                });
            }

            // Accordion toggles
            document.getElementById('bev-header').addEventListener('click', () => {
                document.getElementById('bev-header').classList.toggle('open');
                document.getElementById('bev-items').classList.toggle('open');
            });
            document.getElementById('cocktail-header').addEventListener('click', () => {
                document.getElementById('cocktail-header').classList.toggle('open');
                document.getElementById('cocktail-items').classList.toggle('open');
            });

            // Open modal
            window.orderItem = function (itemName) {
                // Find the item across all categories
                let found = null;
                for (const cat of Object.values(menuData)) {
                    found = cat.find(i => i.name === itemName);
                    if (found) break;
                }
                if (!found) return;

                document.getElementById('modal-food-img').src = found.image;
                document.getElementById('modal-food-name').textContent = found.name;
                document.getElementById('modal-food-desc').textContent = found.description;
                document.getElementById('modal-food-price').textContent = found.price;
                currentFoodPrice = parsePrice(found.price);

                // Reset selections
                selectedAddons = { beverages: new Set(), cocktails: new Set() };
                document.getElementById('bev-count').textContent = '0 selected';
                document.getElementById('cocktail-count').textContent = '0 selected';

                // Build fresh chips
                buildChips('bev-items', 'beverages', 'bev-count');
                buildChips('cocktail-items', 'cocktails', 'cocktail-count');
                updateTotal();

                // Collapse accordions
                document.getElementById('bev-header').classList.remove('open');
                document.getElementById('bev-items').classList.remove('open');
                document.getElementById('cocktail-header').classList.remove('open');
                document.getElementById('cocktail-items').classList.remove('open');

                // Clear table number
                document.getElementById('table-number').value = '';

                overlay.classList.add('active');
                modal.classList.add('active');
                document.body.style.overflow = 'hidden';
            };

            function closeModal() {
                modal.classList.remove('active');
                overlay.classList.remove('active');
                document.body.style.overflow = '';
            }
            modalClose.addEventListener('click', closeModal);
            overlay.addEventListener('click', closeModal);

            // Confirm = clear selections
            modalConfirm.addEventListener('click', () => {
                selectedAddons = { beverages: new Set(), cocktails: new Set() };
                document.getElementById('bev-count').textContent = '0 selected';
                document.getElementById('cocktail-count').textContent = '0 selected';
                document.querySelectorAll('.addon-chip.selected').forEach(c => c.classList.remove('selected'));
                updateTotal();
            });

            // Place Order
            document.getElementById('place-order').addEventListener('click', () => {
                const tableNo = document.getElementById('table-number').value.trim();

                if (!tableNo) {
                    showToast('⚠️ Please enter your Table Number');
                    document.getElementById('table-number').focus();
                    return;
                }

                const foodName = document.getElementById('modal-food-name').textContent;
                const total = document.getElementById('modal-total').textContent;
                const drinks = [...selectedAddons.beverages, ...selectedAddons.cocktails];
                const extra = drinks.length ? ` + ${drinks.join(', ')}` : '';

                // Send the order payload to Firebase
                const payload = {
                    table: tableNo,
                    food: foodName,
                    drinks: drinks,
                    total: total,
                    status: 'new',
                    timestamp: Date.now(),
                    orderNumber: Math.floor(1000 + Math.random() * 9000).toString()
                };

                if (window.firebasePush && window.firebaseRef && window.firebaseDb) {
                    const newOrderRef = window.firebasePush(window.firebaseRef(window.firebaseDb, 'orders'), payload);
                    localStorage.setItem('activeOrderId', newOrderRef.key);
                    localStorage.setItem('activeOrderTable', tableNo);
                    if (window.startTracking) window.startTracking(newOrderRef.key, tableNo);
                } else {
                    console.log("Sending order locally (Firebase not loaded):", payload);
                }

                closeModal();
                showToast('✅ Order confirmed');
            });

            function showToast(message) {
                let toast = document.querySelector('.order-toast');
                if (!toast) {
                    toast = document.createElement('div');
                    toast.className = 'order-toast';
                    document.body.appendChild(toast);
                }
                toast.textContent = message;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 3000);
            }

            window.startTracking = function (orderId, table) {
                const tracker = document.getElementById('order-tracker');
                const closeBtn = document.getElementById('tracker-close');
                document.getElementById('tracker-table').textContent = table;
                tracker.className = 'order-tracker visible status-new';

                if (window.firebaseOnValue && window.firebaseRef && window.firebaseDb) {
                    const orderRef = window.firebaseRef(window.firebaseDb, 'orders/' + orderId);
                    window.firebaseOnValue(orderRef, (snapshot) => {
                        const data = snapshot.val();
                        if (data) {
                            document.getElementById('tracker-table').textContent = `#${data.orderNumber || '?'} - TBL ${table}`;

                            tracker.className = `order-tracker visible status-${data.status}`;
                            let statusText = "Sent to Kitchen 📋";
                            if (closeBtn) closeBtn.classList.add('hidden');

                            if (data.status === 'prep') {
                                statusText = "Cooking... 🍳";
                            }
                            if (data.status === 'ready') {
                                statusText = "Ready! 🛎️";
                                if (closeBtn) closeBtn.classList.remove('hidden');
                            }
                            document.getElementById('tracker-status').textContent = statusText;
                        } else {
                            tracker.classList.remove('visible');
                            localStorage.removeItem('activeOrderId');
                            localStorage.removeItem('activeOrderTable');
                        }
                    });
                }
            };

            const closeBtnElement = document.getElementById('tracker-close');
            if (closeBtnElement) {
                closeBtnElement.addEventListener('click', () => {
                    document.getElementById('order-tracker').classList.remove('visible');
                    localStorage.removeItem('activeOrderId');
                    localStorage.removeItem('activeOrderTable');
                });
            }

            // Auto-resume tracking if they refresh
            const savedOrderId = localStorage.getItem('activeOrderId');
            const savedTable = localStorage.getItem('activeOrderTable');
            if (savedOrderId && savedTable) {
                window.startTracking(savedOrderId, savedTable);
            }
        });
    </script>
